<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sekhmet Rising</title>

  <style>
    body {
      margin: 0;
      background: black;
      height: 200vh; /* allows scrolling */
    }

    /* 🔥 HEADER */
    header {
      position: fixed;
      top: 0;
      width: 100%;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: all 0.4s ease;
      padding: 80px 0;
      z-index: 1000;
    }

    /* 🔥 BIG LOGO */
    header img {
      height: 360px;
      transition: all 0.4s ease;
    }

    /* 🔻 SHRINK STATE */
    header.shrink {
      padding: 20px 0;
      background: rgba(0,0,0,0.95);
    }

    header.shrink img {
      height: 140px;
    }
  </style>
</head>

<body>

  <!-- 🔥 LOGO -->
  <header id="header">
    <img src="SEkRise2.jpg" alt="Logo">
  </header>

  <script>
    const header = document.getElementById("header");

    window.addEventListener("scroll", function() {
      if (window.scrollY > 50) {
        header.classList.add("shrink");
      } else {
        header.classList.remove("shrink");
      }
    });
  </script>

</body>
</html>
