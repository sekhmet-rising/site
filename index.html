<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sekhmet Rising</title>

  <style>
    body {
      margin: 0;
      background: black;
      height: 200vh;
      overflow-x: hidden;
    }

    header {
      position: fixed;
      top: 0;
      width: 100%;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: padding 0.8s ease, background 0.8s ease;
      padding: 80px 0;
      z-index: 1000;
    }

    header img {
      height: 360px;
      transition: height 0.8s ease, transform 0.8s ease;
      transform: rotate(0deg);
      transform-origin: center center;
      display: block;
    }

    header.shrink {
      padding: 20px 0;
      background: rgba(0, 0, 0, 0.95);
    }

    header.shrink img {
      height: 140px;
      transform: rotate(360deg);
    }
  </style>
</head>
<body>

  <header id="header">
    <img src="SEkRise2.jpg" alt="Logo">
  </header>

  <script>
    const header = document.getElementById("header");

    window.addEventListener("scroll", function () {
      if (window.scrollY > 50) {
        header.classList.add("shrink");
      } else {
        header.classList.remove("shrink");
      }
    });
  </script>

</body>
</html>
